}.hi-c{border-top:6px solid rgba(239,83,80,.5)}.lo-c{border-top:6px solid rgba(255,167,38,.5)}.er-c{border-top:6px solid rgba(150,150,150,.5)}.rc-c{border-top:6px solid rgba(156,39,176,.5)}.sc{display:flex;justify-content:space-between;font-size:.58em;color:var(--secondary-text-color)}.sc .sp{color:#66bb6a;font-weight:600}</style>{% set p %}{{ pct(rc_val,2.0,4.0) }}{% endset %}<div class=''lz'' onclick="this.dispatchEvent(new CustomEvent(''hass-more-info'',{bubbles:true,composed:true,detail:{entityId:''sensor.pool_chem_free_chlorine''}}))"><div class=''lh''><span class=''ln''>🧪 Free Chlorine</span></div><div class=''bw''><div class=''bar cent''></div>{% if is_err %}<div class=''fb er'' style=''left:50%''>Error</div><div class=''fc er-c'' style=''left:50%''></div>{% elif ph_err %}<div class=''fb rc'' style=''left:clamp(5%,{{p}}%,95%)''>Recalc {{rc_val}} ppm</div><div class=''fc rc-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% elif rc_val>=3.0-0.5 and rc_val<=3.0+0.5 %}<div class=''fb ok'' style=''left:clamp(5%,{{p}}%,95%)''>Ideal {{rc_val}} ppm</div><div class=''fc ok-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% elif rc_val>3.0+0.5 %}<div class=''fb hi'' style=''left:clamp(5%,{{p}}%,95%)''>Too High {{rc_val}} ppm</div><div class=''fc hi-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% else %}<div class=''fb lo'' style=''left:clamp(5%,{{p}}%,95%)''>Too Low {{rc_val}} ppm</div><div class=''fc lo-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% endif %}{% if not is_err %}<div class=''mv'' style=''left:{{p}}%''></div>{% endif %}</div><div class=''sc''><span>2.0</span><span>2.5</span><span class=''sp''>3.0</span><span>3.5</span><span>4.0</span></div></div>'
