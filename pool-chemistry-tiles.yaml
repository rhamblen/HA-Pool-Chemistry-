vent(new CustomEvent(''hass-more-info'',{bubbles:true,composed:true,detail:{entityId:''sensor.pool_chem_temperature''}}))"><div class=''lh''><span class=''ln''>🌡️ Temperature</span></div><div class=''bw''><div class=''bar heat''></div>{% if is_err %}<div class=''fb er'' style=''left:50%''>Error</div><div class=''fc er-c'' style=''left:50%''></div>{% elif val>=26-4 and val<=26+4 %}<div class=''fb ok'' style=''left:clamp(5%,{{p}}%,95%)''>Ideal {{val}} °C</div><div class=''fc ok-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% elif val>26+4 %}<div class=''fb hi'' style=''left:clamp(5%,{{p}}%,95%)''>Too High {{val}} °C</div><div class=''fc hi-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% else %}<div class=''fb lo'' style=''left:clamp(5%,{{p}}%,95%)''>Too Low {{val}} °C</div><div class=''fc lo-c'' style=''left:clamp(5%,{{p}}%,95%)''></div>{% endif %}{% if not is_err %}<div class=''mv'' style=''left:{{p}}%''></div>{% endif %}</div><div class=''sc''><span>10</span><span>18</span><span>22</span><span class=''sp''>26</span><span>30</span><span>35</span></div></div>'
